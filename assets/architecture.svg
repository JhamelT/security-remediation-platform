<line x1="125" y1="468" x2="128" y2="465" stroke="#fff" stroke-width="1.6"/>
<text class="th" x="154" y="452" dominant-baseline="central">IAM</text>
<text class="ts" x="154" y="470" dominant-baseline="central">Quarantine identity</text>

<g><rect class="box" x="390" y="430" width="200" height="56" rx="8"/></g>
<rect x="398" y="436" width="44" height="44" rx="6" fill="#993556"/>
<path d="M413,462 Q413,452 420,451 Q427,452 427,462 Z" fill="#fff"/>
<line x1="410" y1="462" x2="430" y2="462" stroke="#fff" stroke-width="2"/>
<circle cx="420" cy="450" r="1.6" fill="#fff"/><circle cx="420" cy="465" r="2" fill="#fff"/>
<text class="th" x="444" y="452" dominant-baseline="central">SNS</text>
<text class="ts" x="444" y="470" dominant-baseline="central">Alert security team</text>

<g><rect class="box" x="120" y="512" width="440" height="48" rx="8"/></g>
<rect x="128" y="518" width="36" height="36" rx="6" fill="#993556"/>
<circle cx="143" cy="531" r="6" fill="none" stroke="#fff" stroke-width="2"/>
<line x1="148" y1="536" x2="153" y2="541" stroke="#fff" stroke-width="2"/>
<text class="th" x="176" y="528" dominant-baseline="central">CloudTrail audits everything</text>
<text class="ts" x="176" y="546" dominant-baseline="central">SOC 2 · HIPAA · PCI ready</text>

<g><rect class="box" x="120" y="572" width="440" height="44" rx="8"/></g>
<rect x="128" y="576" width="36" height="36" rx="6" fill="#BA7517"/>
<polygon points="135,587 146,584 157,587 146,590" fill="none" stroke="#fff" stroke-width="1.3"/>
<polygon points="135,594 146,591 157,594 146,597" fill="none" stroke="#fff" stroke-width="1.3"/>
<text class="th" x="176" y="588" dominant-baseline="central">Entire stack = Terraform</text>
<text class="ts" x="176" y="604" dominant-baseline="central">~$6/mo · MTTR hours to under 60s</text>

<rect x="70" y="638" width="12" height="12" rx="2" fill="#A32D2D"/>
<text class="ts" x="88" y="645" dominant-baseline="central">Security</text>
<rect x="168" y="638" width="12" height="12" rx="2" fill="#993556"/>
<text class="ts" x="186" y="645" dominant-baseline="central">Integration / Mgmt</text>
<rect x="330" y="638" width="12" height="12" rx="2" fill="#ED7100"/>
<text class="ts" x="348" y="645" dominant-baseline="central">Compute</text>
