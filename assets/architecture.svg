<svg xmlns="http://www.w3.org/2000/svg" width="680" height="670" viewBox="0 0 680 670" role="img" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>AWS Security Remediation Platform — Architecture</title>
<desc>Account activity logs feed GuardDuty inside the AWS Cloud. A high-severity finding triggers EventBridge, which invokes Lambda. Lambda quarantines the identity via IAM and alerts the team via SNS. CloudTrail audits everything and Terraform defines the stack.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5b6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.box { fill:#ffffff; stroke:#d4d9e0; stroke-width:1; }
.th { fill:#1a2230; font-size:14px; font-weight:600; }
.ts { fill:#5b6472; font-size:12px; }
.arr { stroke:#5b6472; stroke-width:1.5; fill:none; }
.cloud { fill:none; stroke:#aab2bf; stroke-width:1; stroke-dasharray:6 4; }
.cloudlbl { fill:#5b6472; font-size:12px; }
</style>
</defs>
<rect width="680" height="670" fill="#f7f8fa"/>

<g><rect class="box" x="200" y="24" width="280" height="52" rx="8"/></g>
<rect x="208" y="30" width="40" height="40" rx="6" fill="#5F5E5A"/>
<line x1="219" y1="44" x2="237" y2="44" stroke="#fff" stroke-width="1.5"/>
<line x1="219" y1="50" x2="233" y2="50" stroke="#fff" stroke-width="1.5"/>
<line x1="219" y1="56" x2="237" y2="56" stroke="#fff" stroke-width="1.5"/>
<text class="th" x="258" y="42" dominant-baseline="central">Account activity</text>
<text class="ts" x="258" y="60" dominant-baseline="central">CloudTrail · VPC flow · DNS logs</text>
<line x1="340" y1="76" x2="340" y2="120" class="arr" marker-end="url(#arrow)"/>

<rect class="cloud" x="48" y="90" width="584" height="540" rx="14"/>
<path d="M62,104 q0,-7 8,-6 q3,-5 9,-2 q6,-1 6,6 q5,1 3,6 H60 q-3,-4 2,-4 Z" fill="none" stroke="#8C4FFF" stroke-width="1"/>
<text class="cloudlbl" x="92" y="106" dominant-baseline="central">AWS Cloud</text>

<g><rect class="box" x="200" y="124" width="280" height="56" rx="8"/></g>
<rect x="208" y="130" width="44" height="44" rx="6" fill="#A32D2D"/>
<path d="M230,141 L239,145 V153 Q239,161 230,164 Q221,161 221,153 V145 Z" fill="none" stroke="#fff" stroke-width="2"/>
<path d="M226,152 L229,155 L235,148" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<text class="th" x="264" y="146" dominant-baseline="central">GuardDuty</text>
<text class="ts" x="264" y="164" dominant-baseline="central">ML threat detection</text>
<line x1="340" y1="180" x2="340" y2="206" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="430" y="193" dominant-baseline="central">severity ≥ 4.0</text>

<g><rect class="box" x="200" y="206" width="280" height="56" rx="8"/></g>
<rect x="208" y="212" width="44" height="44" rx="6" fill="#993556"/>
<line x1="221" y1="234" x2="230" y2="234" stroke="#fff" stroke-width="2"/>
<line x1="230" y1="234" x2="239" y2="228" stroke="#fff" stroke-width="2"/>
<line x1="230" y1="234" x2="239" y2="240" stroke="#fff" stroke-width="2"/>
<circle cx="220" cy="234" r="2.2" fill="#fff"/><circle cx="240" cy="228" r="2.2" fill="#fff"/><circle cx="240" cy="240" r="2.2" fill="#fff"/>
<text class="th" x="264" y="228" dominant-baseline="central">EventBridge</text>
<text class="ts" x="264" y="246" dominant-baseline="central">Pattern-match router</text>
<line x1="340" y1="262" x2="340" y2="292" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="424" y="277" dominant-baseline="central">invokes &lt; 1s</text>

<g><rect class="box" x="200" y="292" width="280" height="96" rx="8"/></g>
<rect x="208" y="298" width="44" height="44" rx="6" fill="#ED7100"/>
<text x="230" y="321" fill="#fff" font-size="24" text-anchor="middle" dominant-baseline="central">&#955;</text>
<text class="th" x="264" y="314" dominant-baseline="central">Lambda</text>
<text class="ts" x="264" y="338" dominant-baseline="central">Deactivate access keys</text>
<text class="ts" x="264" y="358" dominant-baseline="central">Attach deny policy</text>
